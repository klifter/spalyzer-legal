                    { h: "Foto-Analyse & Rate-Limits", b: "<p>Die Foto-Analyse nutzt Drittanbieter-Dienste (OpenAI Vision über unser Supabase-Backend) und unterliegt einem täglichen Rate-Limit pro Gerät. Wir behalten uns das Recht vor, das Rate-Limit zu ändern, den zugrundeliegenden Anbieter zu wechseln oder die Foto-Analyse vorübergehend ohne Vorankündigung auszusetzen. Manuelle Werteingabe bleibt unabhängig davon verfügbar.</p>" },

                    { h: "Acceptance of Terms", b: "<p>By downloading, installing, or using Spalyzer (\"the App\"), you agree to be bound by these Terms of Use. If you do not agree, please do not use the App.</p>" },
                    { h: "Description of Service", b: "<p>Spalyzer is a mobile application that reads water chemistry values from photos of pool test reader displays, test strips, and product labels, and provides general dosing guidance for swimming pools. The App is provided by Klifter Apps (\"we\", \"us\", or \"our\").</p>" },
                    { h: "Disclaimer — No Professional Advice", b: "<p>The water chemistry information, dosing suggestions, and safety warnings provided by Spalyzer are for informational purposes only. They do not constitute professional, medical, chemical, or safety advice. Pool chemistry is sensitive and improper handling of chemicals can cause harm. We make no guarantees regarding the accuracy of recognized values, dosing calculations, or safety assessments.</p><p><strong>Always read and follow the manufacturer's instructions on the product label of any chemical you use. When in doubt, consult a qualified pool maintenance professional.</strong></p>" },

                sections: [
                    { h: "Aceptación de las condiciones", b: "<p>Al descargar, instalar o usar Spalyzer («la App»), aceptas estar sujeto a estas Condiciones de Uso. Si no estás de acuerdo, no uses la App.</p>" },
                    { h: "Descripción del servicio", b: "<p>Spalyzer es una aplicación móvil que lee los valores de química del agua a partir de fotos de displays de lectores, tiras reactivas y etiquetas de productos, y ofrece orientación general de dosificación para piscinas. La App es proporcionada por Klifter Apps («nosotros»).</p>" },
                    { h: "Aviso — Ningún consejo profesional", b: "<p>La información sobre química del agua, las sugerencias de dosificación y las advertencias de seguridad proporcionadas por Spalyzer son únicamente con fines informativos. No constituyen asesoramiento profesional, médico, químico o de seguridad. La química de piscina es sensible y la manipulación inadecuada de productos químicos puede causar daños. No garantizamos la exactitud de los valores reconocidos, los cálculos de dosificación o las evaluaciones de seguridad.</p><p><strong>Lee y sigue siempre las instrucciones del fabricante en la etiqueta del producto de cualquier químico que uses. En caso de duda, consulta a un profesional cualificado de mantenimiento de piscinas.</strong></p>" },

                    { h: "Uso bajo tu propio riesgo", b: "<p>Reconoces que:</p><ul><li>Los productos químicos para piscinas pueden ser peligrosos si se manejan mal, se mezclan incorrectamente o se usan en dosis incorrectas.</li><li>Bañarse en agua con valores fuera de los rangos seguros puede causar daño.</li><li>Eres el único responsable de asegurar que el agua de tu piscina sea segura para el uso.</li><li>Las sugerencias de la App son pautas generales que asumen condiciones específicas (desinfección por cloro, opcionalmente ozonador) y pueden no aplicar a tu situación.</li></ul>" },
                    { h: "Limitación de responsabilidad", b: "<p>En la máxima medida permitida por la ley aplicable, Klifter Apps no será responsable de ningún daño directo, indirecto, incidental, especial, consecuente o punitivo que surja de tu uso o incapacidad de uso de la App, incluyendo pero no limitado a:</p><ul><li>Reconocimiento incorrecto de valores de química del agua</li><li>Cálculos o recomendaciones de dosificación incorrectos</li><li>Daños a tu piscina, equipo o entorno</li><li>Lesiones o enfermedades por agua tratada incorrectamente</li><li>Pérdida de datos almacenados en tu dispositivo</li><li>Interrupción o no disponibilidad de la App o de su backend de análisis</li></ul>" },
                    { h: "Sin garantía", b: "<p>La App se proporciona «tal cual» y «según disponibilidad» sin garantías de ningún tipo, ya sean expresas o implícitas, incluyendo pero no limitado a garantías implícitas de comerciabilidad, idoneidad para un propósito particular y no infracción. No garantizamos que la App esté libre de interrupciones, libre de errores o que el análisis de fotos siempre tenga éxito.</p>" },
                    { h: "Análisis de fotos y límites de tasa", b: "<p>El análisis de fotos usa servicios de terceros (OpenAI Vision, vía nuestro backend Supabase) y está sujeto a un límite diario por dispositivo. Nos reservamos el derecho de cambiar el límite, cambiar el proveedor subyacente o suspender temporalmente la función de análisis sin previo aviso. La introducción manual permanece disponible.</p>" },

                    { h: "Acceptation des conditions", b: "<p>En téléchargeant, installant ou utilisant Spalyzer (« l'App »), tu acceptes d'être lié par ces Conditions d'utilisation. Si tu n'es pas d'accord, n'utilise pas l'App.</p>" },
                    { h: "Description du service", b: "<p>Spalyzer est une application mobile qui lit les valeurs de chimie de l'eau à partir de photos d'écrans de lecteurs, de bandelettes et d'étiquettes de produits, et fournit une orientation générale de dosage pour les piscines. L'App est fournie par Klifter Apps (« nous »).</p>" },
                    { h: "Avertissement — Aucun conseil professionnel", b: "<p>Les informations sur la chimie de l'eau, les suggestions de dosage et les avertissements de sécurité fournis par Spalyzer sont à titre informatif uniquement. Ils ne constituent pas un conseil professionnel, médical, chimique ou de sécurité. La chimie de piscine est sensible et la manipulation inappropriée de produits chimiques peut causer des dommages. Nous ne donnons aucune garantie quant à l'exactitude des valeurs reconnues, des calculs de dosage ou des évaluations de sécurité.</p><p><strong>Lis et suis toujours les instructions du fabricant sur l'étiquette du produit de tout produit chimique que tu utilises. En cas de doute, consulte un professionnel qualifié d'entretien de piscine.</strong></p>" },
                    { h: "Précision de la reconnaissance d'image", b: "<p>L'App utilise la vision par ordinateur pour lire les valeurs des photos. La précision de la reconnaissance dépend de l'éclairage, de la mise au point, du cadrage et de la qualité de l'image, et n'est pas parfaite. Tu es responsable de vérifier chaque valeur reconnue avant de confirmer une mesure et d'agir sur toute recommandation de dosage. L'App te permet toujours de réviser et de corriger les valeurs avant de sauvegarder.</p>" },
                    { h: "Utilisation à tes risques", b: "<p>Tu reconnais que :</p><ul><li>Les produits chimiques pour piscine peuvent être dangereux s'ils sont mal manipulés, mal mélangés ou utilisés dans des dosages incorrects.</li><li>Se baigner dans une eau avec des valeurs hors plages sûres peut causer du tort.</li><li>Tu es seul responsable de t'assurer que l'eau de ta piscine est sûre.</li><li>Les suggestions de l'App sont des lignes directrices générales qui supposent des conditions spécifiques (désinfection au chlore, optionnellement un ozonateur) et peuvent ne pas s'appliquer à ta situation.</li></ul>" },
                    { h: "Limitation de responsabilité", b: "<p>Dans la mesure maximale permise par la loi applicable, Klifter Apps ne sera pas responsable des dommages directs, indirects, accessoires, spéciaux, consécutifs ou punitifs découlant de ton utilisation ou de ton incapacité d'utiliser l'App, y compris mais sans s'y limiter :</p><ul><li>Reconnaissance incorrecte des valeurs de chimie de l'eau</li><li>Calculs ou recommandations de dosage incorrects</li><li>Dommages à ta piscine, équipement ou environnement</li><li>Blessure ou maladie résultant d'eau mal traitée</li><li>Perte de données stockées sur ton appareil</li><li>Interruption ou indisponibilité de l'App ou de son backend d'analyse</li></ul>" },
                    { h: "Aucune garantie", b: "<p>L'App est fournie « telle quelle » et « selon disponibilité » sans garanties d'aucune sorte, qu'elles soient expresses ou implicites, y compris mais sans s'y limiter aux garanties implicites de qualité marchande, d'aptitude à un usage particulier et de non-contrefaçon. Nous ne garantissons pas que l'App sera ininterrompue, sans erreur, ou que son analyse photo réussira toujours.</p>" },
                    { h: "Analyse photo et limites de débit", b: "<p>L'analyse photo utilise des services tiers (OpenAI Vision, via notre backend Supabase) et est soumise à une limite quotidienne par appareil. Nous nous réservons le droit de modifier la limite, de changer de fournisseur sous-jacent ou de suspendre temporairement la fonction d'analyse sans préavis. La saisie manuelle reste disponible.</p>" },
                    { h: "Propriété intellectuelle", b: "<p>Tout le contenu, le design et le code de Spalyzer sont la propriété de Klifter Apps et sont protégés par les lois applicables sur la propriété intellectuelle. Tu ne peux pas copier, modifier, distribuer ou rétro-ingénierer aucune partie de l'App.</p>" },
                    { h: "Modifications de ces conditions", b: "<p>Nous nous réservons le droit de modifier ces Conditions d'utilisation à tout moment. L'utilisation continue de l'App après modifications constitue l'acceptation des conditions mises à jour.</p>" },
                    { h: "Droit applicable", b: "<p>Ces Conditions sont régies et interprétées conformément aux lois de la Suisse, sans considération de ses dispositions de conflit de lois.</p>" },
                    { h: "Contact", b: "<p>Pour toute question concernant ces Conditions d'utilisation, contacte-nous à <a href=\"mailto:support@klifter.com\">support@klifter.com</a>.</p>" }
                ]
            },

                updated: "Ultimo aggiornamento: 5 maggio 2026",
                sections: [
                    { h: "Accettazione delle condizioni", b: "<p>Scaricando, installando o usando Spalyzer («l'App»), accetti di essere vincolato da queste Condizioni d'uso. Se non sei d'accordo, non usare l'App.</p>" },
                    { h: "Descrizione del servizio", b: "<p>Spalyzer è un'applicazione mobile che legge i valori di chimica dell'acqua da foto di display di lettori, strisce reattive ed etichette di prodotti, e fornisce indicazioni generali di dosaggio per piscine. L'App è fornita da Klifter Apps («noi»).</p>" },
                    { h: "Avvertenza — Nessuna consulenza professionale", b: "<p>Le informazioni sulla chimica dell'acqua, i suggerimenti di dosaggio e gli avvisi di sicurezza forniti da Spalyzer sono solo a scopo informativo. Non costituiscono consulenza professionale, medica, chimica o di sicurezza. La chimica della piscina è delicata e la manipolazione impropria dei prodotti chimici può causare danni. Non garantiamo l'accuratezza dei valori riconosciuti, dei calcoli di dosaggio o delle valutazioni di sicurezza.</p><p><strong>Leggi e segui sempre le istruzioni del produttore sull'etichetta del prodotto di qualsiasi prodotto chimico che usi. In caso di dubbio, consulta un professionista qualificato di manutenzione piscine.</strong></p>" },

        const SUPPORTED = ["de", "en", "es", "fr", "it", "pt"];

        function detectLang() {
            try {
                const stored = localStorage.getItem("spalyzer-lang");
                if (stored && SUPPORTED.includes(stored)) return stored;
            } catch (_) {}
            const nav = (navigator.language || navigator.userLanguage || "en")
                .slice(0, 2).toLowerCase();
            return SUPPORTED.includes(nav) ? nav : "en";
        }

        function setLang(lang) {
            const t = translations[lang] || translations.en;
            document.documentElement.lang = lang;
            document.title = t.title + " — Spalyzer";
            document.getElementById("page-title").textContent = t.title;
            document.getElementById("page-subtitle").textContent = t.subtitle;
            document.getElementById("updated").textContent = t.updated;

            const container = document.getElementById("sections");
            container.innerHTML = "";
            t.sections.forEach(s => {
                const h2 = document.createElement("h2");
                h2.textContent = s.h;
                container.appendChild(h2);
                const wrap = document.createElement("div");
                wrap.innerHTML = s.b;
                container.appendChild(wrap);
            });

            document.querySelectorAll("#lang-switcher button").forEach(btn => {
                btn.classList.toggle("active", btn.dataset.lang === lang);
            });
            try { localStorage.setItem("spalyzer-lang", lang); } catch (_) {}
        }

        document.querySelectorAll("#lang-switcher button").forEach(btn => {
            btn.addEventListener("click", () => setLang(btn.dataset.lang));
        });

        setLang(detectLang());
    </script>
