    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      padding: 40px 20px;
    }
    .container { max-width: 680px; margin: 0 auto; }
    .lang-switcher {
      display: flex;
      gap: 6px;
      justify-content: flex-end;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .lang-switcher button {
      background: white;
      border: 1px solid #d2d2d7;
      color: #1d1d1f;
      font-size: 13px;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 980px;
      cursor: pointer;
      font-family: inherit;
    }
    .lang-switcher button.active {
      background: #1d1d1f;
      color: white;
      border-color: #1d1d1f;
    }
    .lang-switcher button:hover:not(.active) {
      background: #f5f5f7;
    }
    header { text-align: center; margin-bottom: 48px; }
    header h1 { font-size: 36px; font-weight: 700; letter-spacing: -0.5px; }
    header h1 span { color: #3FB8E0; }
    header p { color: #6e6e73; margin-top: 8px; font-size: 16px; }
    .card {
      background: white;
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    h2 { font-size: 20px; font-weight: 600; margin-bottom: 12px; }
    p { line-height: 1.65; color: #3a3a3c; font-size: 15px; }
    ul { padding-left: 20px; margin-top: 8px; }
    li { line-height: 1.8; color: #3a3a3c; font-size: 15px; }
    a { color: #007aff; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .contact-btn {
      display: inline-block;
      margin-top: 16px;
      padding: 12px 24px;
      background: #1d1d1f;
      color: white;
      border-radius: 980px;
      font-size: 15px;
      font-weight: 500;
      text-decoration: none;
    }
    footer { text-align: center; color: #6e6e73; font-size: 13px; margin-top: 40px; }
  </style>
</head>

    const SUPPORTED = ["de", "en", "es", "fr", "it", "pt"];

    function detectLang() {
      // Stored preference wins (user clicked a flag before).
      try {
        const stored = localStorage.getItem("spalyzer-lang");
        if (stored && SUPPORTED.includes(stored)) return stored;
      } catch (_) { /* private mode etc. */ }
      // Otherwise: 2-char ISO from navigator.language (iOS WebView
      // propagates device language as e.g. "de-CH", "pt-BR").
      const nav = (navigator.language || navigator.userLanguage || "en")
        .slice(0, 2)
        .toLowerCase();
      return SUPPORTED.includes(nav) ? nav : "en";
    }

    function setLang(lang) {
      const t = translations[lang] || translations.en;
      document.documentElement.lang = lang;
      document.title = "Spalyzer — " + t.subtitle;

      document.querySelectorAll("[data-i18n]").forEach(el => {
        const key = el.getAttribute("data-i18n");
        if (t[key]) el.textContent = t[key];
      });

      // FAQ list rendered from the array — keeps HTML clean and avoids
      // 60 separate <li> elements per language.
      const ul = document.getElementById("faq-list");
      ul.innerHTML = "";
      t.faq.forEach(([q, a]) => {
        const li = document.createElement("li");
        const strong = document.createElement("strong");
        strong.textContent = q;
        li.appendChild(strong);
        li.appendChild(document.createTextNode(" — " + a));
        ul.appendChild(li);
      });

      document.querySelectorAll("#lang-switcher button").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.lang === lang);
      });

      try { localStorage.setItem("spalyzer-lang", lang); } catch (_) {}
    }

    document.querySelectorAll("#lang-switcher button").forEach(btn => {
      btn.addEventListener("click", () => setLang(btn.dataset.lang));
    });

    setLang(detectLang());
